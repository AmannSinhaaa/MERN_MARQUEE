<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML TABLE</title>
    <style>
        table,
        td,
        th,
        tr{
            border: 1px solid black;
        }
    </style>
</head>

            <td> Developer </td>
            <td> 3.6 </td>
        </tbody>

        <tbody>
            <td> 912 </td>
            <td> Aniket Patil </td>
            <td> Tester </td>
            <td> 3.2 </td>
        </tbody>

        <tbody>
            <td> 913 </td>
            <td> Anshul Sharma </td>
            <td> HR </td>
            <td> 3.8 </td>
        </tbody>

    </table>
</body>
</html>
