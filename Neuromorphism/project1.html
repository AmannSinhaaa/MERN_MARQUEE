<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beautiful Product Card</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to right, #f5f7fa, #dfe9f3);
            font-family: Arial, Helvetica, sans-serif;
        }

        #container{
            width: 300px;
            background-color: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        #container:hover{
            transform: translateY(-10px);
        }

        .img-container{
            position: relative;
        }

        .img-container img{
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .fav{
            position: absolute;
            top: 15px;
            left: 15px;
            width: 45px;
            height: 45px;
            background-color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            color: red;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .fav:hover{
            transform: scale(1.1);
            background-color: #ffe5e5;
        }

        .content{
            padding: 20px;
            text-align: center;
        }

        h3{
            font-size: 28px;
            color: #222;
            margin-bottom: 12px;
        }

        .price{
            font-size: 24px;
            font-weight: bold;
            color: #c31818;
            margin-bottom: 15px;
        }

        p{
            font-size: 16px;
            color: #555;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .buy-btn{
            display: inline-block;
            text-decoration: none;
            background-color: #c31818;
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }

        .buy-btn:hover{
            background-color: black;
        }

    </style>

</head>

<body>

    <article id="container">

        <section class="img-container">

            <div class="fav">❤</div>

            <img 
                src="https://assets.adidas.com/images/h_2000,f_auto,q_auto,fl_lossy,c_fill,g_auto/8379c4f319d34f948399a95e6f4b28ac_9366/Argentina_26_Away_Jersey_Black_JM8395_21_model.jpg"
                alt="Argentina Jersey"
            >

        </section>

        <section class="content">

            <h3>Argentina Jersey</h3>

            <div class="price">$40.5 USD</div>

            <p>
                Comfortable and stylish jersey for daily wear with premium quality fabric and modern design.
            </p>

            <a 
                href="https://www.adidas.co.in/argentina-26-away-jersey/JM8395.html?pr=taxonomy_rr&slot=2&rec=mt"
                target="_blank"
                class="buy-btn"
            >
                Buy Now
            </a>

        </section>

    </article>

</body>
</html>
