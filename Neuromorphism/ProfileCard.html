<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile Card</title>

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #e9e9e9;
    }

    .card{
      width: 350px;
      background: #f5f5f5;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 8px 8px 15px #d1d1d1,
                  -8px -8px 15px #ffffff;
      position: relative;
    }

    .top-icons{
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
      color: #555;
      font-size: 20px;
    }

    .profile{
      text-align: center;
    }

    .profile img{
      width: 130px;
      height: 130px;
      border-radius: 50%;
      object-fit: cover;
      padding: 8px;
      background: #f5f5f5;
      box-shadow: 5px 5px 10px #d1d1d1,
                  -5px -5px 10px #ffffff;
    }

    .profile h2{
      margin-top: 20px;
      font-size: 35px;
      color: #333;
    }

    .profile p{
      margin-top: 8px;
      color: #666;
      font-size: 18px;
    }

    .social-icons{
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 30px 0;
    }

    .social-icons a{
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      text-decoration: none;
      font-size: 20px;
      box-shadow: 5px 5px 10px #d1d1d1,
                  -5px -5px 10px #ffffff;
    }

    .facebook{
      color: #1877f2;
    }

    .twitter{
      color: #1da1f2;
    }

    .instagram{
      color: #e1306c;
    }

    .youtube{
      color: red;
    }

    .buttons{
      display: flex;
      justify-content: space-between;
      margin-bottom: 30px;
    }

    .buttons button{
      width: 45%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      background: #f5f5f5;
      font-size: 20px;
      cursor: pointer;
      box-shadow: 5px 5px 10px #d1d1d1,
                  -5px -5px 10px #ffffff;
      transition: 0.3s;
    }

    .buttons button:hover{
      transform: scale(1.03);
    }

    .stats{
      display: flex;
      justify-content: space-around;
      border-top: 2px solid #ddd;
      padding-top: 20px;
      color: #555;
      font-size: 22px;
    }

    .stats div{
      display: flex;
      align-items: center;
      gap: 8px;
    }
  </style>
</head>
<body>

  <div class="card">

    <div class="top-icons">
      <i class="fa-solid fa-arrow-left"></i>
      <i class="fa-solid fa-ellipsis-vertical"></i>
    </div>

    <div class="profile">
      <img src="https://i.pravatar.cc/300" alt="profile">

      <h2>CodingNepal</h2>
      <p>Designer & Developer</p>
    </div>

    <div class="social-icons">
      <a href="#" class="facebook">
        <i class="fa-brands fa-facebook-f"></i>
      </a>

      <a href="#" class="twitter">
        <i class="fa-brands fa-twitter"></i>
      </a>

      <a href="#" class="instagram">
        <i class="fa-brands fa-instagram"></i>
      </a>

      <a href="#" class="youtube">
        <i class="fa-brands fa-youtube"></i>
      </a>
    </div>

    <div class="buttons">
      <button>Message</button>
      <button>Subscribe</button>
    </div>

    <div class="stats">
      <div>
        <i class="fa-regular fa-heart"></i>
        <span>20.4k</span>
      </div>

      <div>
        <i class="fa-regular fa-comment"></i>
        <span>14.3k</span>
      </div>

      <div>
        <i class="fa-solid fa-share"></i>
        <span>12.8k</span>
      </div>
    </div>

  </div>

</body>
</html>
