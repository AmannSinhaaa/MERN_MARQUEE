<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forms in HTML</title>

    <style>
        input {
            outline: none;
            border: none;
            border-bottom: 2px dotted;
        }
    </style>
</head>

<body>
    <h2>Sports Physical Form</h2>

    <form action="actionPage.html" method="get">
        <fieldset>
            <legend>Athlete Information</legend>

            <ul>
                <li>
                    <label for="fname">First Name:</label>
                    <input type="text" id="fname" name="fname"  required placeholder="Enter your name..." />
                    
                </li>
                <li>
                    <label for="school_team">School/Team:</label>
                    <input type="text" id="school_team" name="school_team" required placeholder="Enter your school or Team" value="Parul University" readonly />
                     
                </li>
                <li>
                    <label for="sports">Sports:</label>
                    <input type="text" id="sports" name="sport" required placeholder="Sports..." />
                </li>
                <li>
                    <label for="parent_guardian">Parent/ Guardian Name:</label>
                    <input type="text" id="parent_guardian" name="parent_guardian" required placeholder="Parent or Guardian.."
                        required />
                </li>

                <li>
                    <label for="contact">Contact Number:</label>
                    <input type="tel" id="contact" name="contact" required placeholder="Example: +91 525252521" required />
                </li>
            </ul>
        </fieldset>

        <fieldset>
            <legend>Medical History for Athlete</legend>

            <ul>
                <li>
                    History Of Concussions:
                    <input type="radio" name="concussions" id="concussions-yes" value="concussions-yes" />
                    <label for="concussions-yes">Yes</label>
                    <input type="radio" name="concussions" id="concussions-no" value="concussions-no" />
                    <label for="concussions-no">No</label>
                     
                </li>
                <li>
                    <label for="previous_surgeries"> Previous Surgeries:</label>

                    <input type="text" name="previous_surgeries" id="previous_surgeries" />
                </li>
                <li>
                    Any bone fractures?:
                    <input type="radio" name="fracture" id="fractures-yes" value="fractures-yes" />
                    <label for="fractures-yes">Yes</label>
                    <input type="radio" name="fractures" id="fractures-no" value="fractures-no" />

                    <label for="fractures-no">No</label>
                     
                </li>
                <li>
                    Asthma or breathing problem?:
                    <input type="radio" name="breathing" id="breathing-yes" value="breathing-yes" />
                    <label for="breathing-yes">Yes</label>
                    <input type="radio" name="breathing" id="breathing-no" value="breathing-no" />
                    <label for="breathing-no">No</label>
                    
                </li>
            </ul>
        </fieldset>
        <fieldset>
          <legend>Date/Time</legend>
          <ul>
            <li>
                <label for="dob">DOB:-</label>
                <input type="date" name="dob" id="dob" required/>
            </li>
            <li>
                <label for="time" >Time:-</label>
                <input type="time" name="time" id="time" />
            </li>
          </ul>
          <fieldset>
            <legend>Textarea</legend>
            <ul>
                <li>

                    <p>Summary of your last operation:</p>
                    <textarea name="" id="summary-1" rows="7" cols="50" placeholder="Enter Summary here..."></textarea>
                </li>
            </ul>
          </fieldset>
          <fieldset>
            <legend>File Input</legend>

            <label for="file">Drop your last medical report:</label>
            <input type="file" name="" id=""   accept="/*.pdf" />
          </fieldset>
          <Fieldset>
            <legend>Check box/Select/Number</legend>
            <ul>
                <li>
            <input type="checkbox" 
            name="" id="checkbox" 
         reuired>
            <label for="checkbox">You have read those Terms and Conditions </label>

                </li>
            </ul>
          </Fieldset>
          <fieldset>
            <legend>Number Input</legend>
            Percentage of HB in the body?
            <input type="Number" name="hb-ration" id="digit">
            <label for=""></label>
          </fieldset>
        </fieldset>
        <label for="phone">Phone Number</label>
        <label for="website">Enter your website:</label>

        <fieldset>
            <legend> Select </legend>
            <label for="states">Select Your State: </label>
            <select name="states" id="states">
            <option value="Gujarat">Gujarat</option>
            <option value="Maharastra">Maharastra</option>
            <option value="Punjab">Punjab</option>
            <option value="Rajasthan">Rajasthan</option>
            <option value="Madhya Pradesh">Madhya Pradesh</option>
            <option value="Uttar Pradesh">Uttar Pradesh</option>
            <option value="Bihar">Bihar</option>
            <option value="Haryana">Haryana</option>
            <option value="Kerala">Kerala</option>
            <option value="Tamil Nadu">Tamil Nadu</option>
            <option value="Karnataka">Karnataka</option>
            <option value="Andhra Pradesh">Andhra Pradesh</option>
            <option value="Odisha">Odisha</option>
            <option value="Chhattisgarh">Chhattisgarh</option>
            <option value="Jharkhand">Jharkhand</option>
            <option value="Assam">Assam</option>
            <option value="Himachal Pradesh">Himachal Pradesh</option>
            <option value="Uttarakhand">Uttarakhand</option>
            <option value="Goa">Goa</option>
            <option value="Tripura">Tripura</option>
            <option value="Meghalaya">Meghalaya</option>
            <option value="Manipur">Manipur</option>
            <option value="Nagaland">Nagaland</option>
            <option value="Arunachal Pradesh">Arunachal Pradesh</option>
            <option value="Mizoram">Mizoram</option>
            <option value="Sikkim">Sikkim</option>
            <option value="Delhi">Delhi</option>
            <option value="Puducherry">Puducherry</option>
            <option value="Chandigarh">Chandigarh</option>
            <option value="Andaman and Nicobar Islands">Andaman and Nicobar</option>
            </select>
            <label for="email">Email: </label>
            <input type="email" name="email" id="email" required placeholder="Enter your email..." />
            <label for="range"></label>
            <input
                type="range"
                name="range"
                id="range"
                min="0"
                max="10"
                value="6"
            />
        </fieldset>


        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
    </form>
</body>

</html>
