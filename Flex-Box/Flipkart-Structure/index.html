<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Online Shopping site for Mobile, Cloths...</title>
    <link
      rel="shortcut icon"
      href="https://tse4.mm.bing.net/th/id/OIP.I70WuHuME5bj3-i-LO_NhwHaHa?rs=1&pid=ImgDetMain&o=7&rm=3"
      type="image/x-icon"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="styles.css" />
    <style>
      * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: gilroy, sans-serif;
}

html,
body {
  height: 100vh;
  width: 100vw;
  background-color: #ffffff;
}
main {
  width: 75%;
  background-color: rgb(216, 213, 213);
  margin: 0px auto;
}
header {
  width: 75%;
  height: 100px;
  /* top, right, bottom left */
  margin: 0px auto;
  position: fixed;
  left: 12%;
  z-index: 100;
}
nav {
  display: flex;
  flex-direction: column;
  background-color: rgb(250, 250, 250);
  gap: 10px;
}

#top-nav {
  display: flex;
  justify-content: space-between;
  margin: 0px 10px;
  padding: 1%;
}

.top-nav-left {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

.btn {
  width: 150px;
  height: 30px;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;

  cursor: pointer;
}
.top-nav-right {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 30%;
}

#bottom-nav {
  background-color: rgb(213, 206, 206);
  height: 50px;
  border-radius: 10px;
  width: 100%;
  padding: 5px;
  /* Flex */
  display: flex;
  gap: 10px;
}

.btn-box {
  width: 70%;
  background-color: aquamarine;
  height: 80%;
}
.login-box {
  width: 25%;
  background-color: rgb(134, 233, 114);
  height: 80%;
}

#icons-box {
  width: 100%;
  background-color: greenyellow;
  height: 80px;
}

#icons-box {
  display: flex;
  align-items: center;
  justify-content: space-around;
  gap: 5px;
}

.icons-items {
  /* flex: 1; */
  width: 70px;
  height: 70px;
  padding: 5px;
  background-color: rgb(233, 233, 233);
}

main {
  position: relative;
  top: 230px;
  margin-left: 11.8%;
}

#ad-banner {
  display: flex;
  gap: 10px;
  padding: 10px;
}

.ad-banners {
  flex: 1;
  background-color: rgb(233, 233, 233);
  height: 150px;
  display: flex;
  justify-content: center;
  align-items: center;
  border-radius: 10px;
}

#banner-item-1 {
  flex-grow: 2;
  background-color: aqua;
}
#banner-item-2 {
  flex-grow: 2;
  background-color: crimson;
}

#banner-item-3 {
  flex-grow: 1;
  background-color: beige;
}
    </style>
  </head>
  <body>
    <header>
      <nav>
        <section id="top-nav">
          <div class="top-nav-left">
            <div class="btn" style="background-color: #ffe51fff">
              ✅ Flipkart
            </div>
            <div style="background-color: gainsboro" class="btn">✈️ Travel</div>
          </div>
          <div class="top-nav-right">
            <i class="fa-sharp fa-solid fa-location-dot"></i>
            <p>Location : Vadodra</p>
          </div>
        </section>

        <section id="bottom-nav">
          <div class="btn-box"></div>
          <div class="login-box"></div>
        </section>
        <section id="icons-box">
          <div class="icons-items">Box 1</div>
          <div class="icons-items">Box 2</div>
          <div class="icons-items">Box 3</div>
          <div class="icons-items">Box 4</div>
          <div class="icons-items">Box 5</div>
          <div class="icons-items">Box 6</div>
          <div class="icons-items">Box 7</div>
          <div class="icons-items">Box 8</div>
          <div class="icons-items">Box 9</div>
          <div class="icons-items">Box 10</div>
          <div class="icons-items">Box 11</div>
          <div class="icons-items">Box 12</div>
          <div class="icons-items">Box 13</div>
          <div class="icons-items">Box 14</div>
        </section>
      </nav>
    </header>
    <main>
      <section id="ad-banner">
        <div class="ad-banners" id="banner-item-1">Ad Banner 1</div>
        <div class="ad-banners" id="banner-item-2">Ad Banner 2</div>
        <div class="ad-banners" id="banner-item-3">Ad Banner 3</div>
      </section>
    </main>
  </body>
</html>
